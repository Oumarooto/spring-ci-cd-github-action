name: Publish to Docker Hub

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 1. Extraction de la version du pom.xml et nettoyage du username
      - name: Prepare Metadata
        id: meta
        run: |
          # Extrait la version (ex: 0.0.1-SNAPSHOT)
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          # Nettoie le username en minuscules
          USER=$(echo "${{ secrets.DOCKERHUB_USERNAME }}" | tr '[:upper:]' '[:lower:]')
          
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "owner=${USER}" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build Package
        run: mvn clean package -Pprod -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 2. Build et Push avec des tags précis
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.owner }}/product-service:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.owner }}/product-service:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max